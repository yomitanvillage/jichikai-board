:root {
  --green-deep:  #1a6b3c;
  --green-mid:   #2d8f54;
  --green-soft:  #4aad70;
  --green-pale:  #e8f5ee;
  --green-faint: #f2faf5;
  --amber:       #e8a020;
  --amber-pale:  #fff8e8;
  --red-soft:    #dc3545;
  --red-pale:    #fff0f0;
  --blue-mid:    #2a6cb5;
  --blue-pale:   #e6f0fa;
  --ink:         #1a1a1a;
  --ink-mid:     #444;
  --ink-light:   #777;
  --ink-faint:   #aaa;
  --surface:     #ffffff;
  --bg:          #f2faf5;
  --border:      #cce4d6;
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; overscroll-behavior: none; }

/* ── ヘッダー ── */
.header { background: var(--green-deep); padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.header-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 52px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-text h1 { font-size: 15px; font-weight: 700; color: white; line-height: 1.2; font-family: 'Noto Serif JP', serif; }
.logo-text p  { font-size: 10px; color: rgba(255,255,255,0.55); }
.menu-btn { background: rgba(255,255,255,0.15); border: none; border-radius: 8px; height: 38px; padding: 0 12px; cursor: pointer; color: white; font-size: 18px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }

/* ── メインエリア ── */
.main { max-width: 480px; margin: 0 auto; padding: 14px 14px 30px; }

/* ── 現在地バー ── */
.location-bar { background: var(--surface); border-radius: var(--radius-md); border: 1.5px solid var(--border); padding: 9px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
.loc-icon { font-size: 16px; flex-shrink: 0; }
.loc-text { flex: 1; font-size: 12px; color: var(--ink-light); }
.loc-text strong { color: var(--green-deep); font-size: 12px; }
.loc-btn { background: var(--green-deep); color: white; border: none; border-radius: var(--radius-sm); padding: 5px 11px; font-size: 12px; font-family: inherit; cursor: pointer; white-space: nowrap; font-weight: 500; }

/* ── セクションラベル ── */
.section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--ink-light); text-transform: uppercase; margin-bottom: 8px; }

/* ── お気に入りバナー ── */
.fav-banner {
  background: linear-gradient(135deg, var(--green-deep), var(--green-mid));
  border-radius: var(--radius-md); padding: 12px 14px;
  margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: opacity 0.15s;
}
.fav-banner:hover { opacity: 0.92; }
.fav-banner-icon { font-size: 22px; flex-shrink: 0; }
.fav-banner-info { flex: 1; min-width: 0; }
.fav-banner-label { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 700; letter-spacing: 0.08em; }
.fav-banner-name { font-size: 16px; font-weight: 700; color: white; font-family: 'Noto Serif JP', serif; }
.fav-banner-arrow { color: rgba(255,255,255,0.7); font-size: 18px; flex-shrink: 0; }
.fav-banner-badge { background: rgba(255,255,255,0.25); color: white; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }

/* ── 自治会リスト ── */
.jichi-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.jichi-item { background: var(--surface); border-radius: var(--radius-md); border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; overflow: hidden; }
.jichi-item:hover { border-color: var(--green-soft); }
.jichi-item.active { border-color: var(--green-mid); border-width: 2px; }
.jichi-item-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
.jichi-dist { min-width: 46px; text-align: center; flex-shrink: 0; }
.dist-n { font-size: 16px; font-weight: 600; color: var(--green-mid); font-family: 'DM Mono', monospace; }
.dist-u { font-size: 9px; color: var(--ink-light); display: block; }
.jichi-idx { font-size: 11px; color: var(--ink-faint); font-family: 'DM Mono', monospace; min-width: 46px; text-align: center; flex-shrink: 0; }
.jichi-info { flex: 1; min-width: 0; }
.jichi-name { font-size: 14px; font-weight: 700; color: var(--ink); }
.jichi-addr { font-size: 11px; color: var(--ink-light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── バッジ（件数 + 色で時期） ── */
.jichi-badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
.badge-today  { background: #e8f5ee; color: #1a6b3c; }
.badge-week   { background: #e6f0fa; color: #2a6cb5; }
.badge-month  { background: #fff8e8; color: #e8a020; }
.badge-old    { background: #f0f4f8; color: #888; }
.badge-none   { background: #f0f0f0; color: var(--ink-faint); }
/* お気に入りカードは左ボーダーで強調 */
.jichi-item.fav-item { border-left: 4px solid var(--amber); }

/* ── 自治会詳細（展開エリア）── */
.jichi-detail { display: none; border-top: 1px solid var(--border); padding: 14px; background: var(--green-faint); }
.jichi-detail.open { display: block; }
.detail-links { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.detail-link-btn { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--ink-mid); text-decoration: none; transition: all 0.12s; }
.detail-link-btn:hover { border-color: var(--green-mid); color: var(--green-deep); }

/* ── お気に入りボタン（小さめ・右寄せ）── */
.fav-toggle-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; margin-bottom: 12px;
  border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); font-size: 11px; font-weight: 700;
  font-family: inherit; cursor: pointer; transition: all 0.15s;
  color: var(--ink-faint); float: right; clear: both;
}
.fav-toggle-btn.is-fav { background: var(--amber-pale); border-color: var(--amber); color: var(--amber); }
.fav-toggle-btn.disabled { background: #f0f0f0; border-color: #ddd; color: #bbb; cursor: not-allowed; }
.fav-toggle-btn:not(.disabled):hover { border-color: var(--green-mid); color: var(--green-deep); }
.fav-toggle-btn.is-fav:hover { border-color: var(--red-soft); color: var(--red-soft); background: var(--red-pale); }

/* ── お知らせボード ── */
.msg-board-header { display: flex; align-items: center; margin-bottom: 10px; }
.msg-board-title { font-size: 14px; font-weight: 700; color: var(--green-deep); display: flex; align-items: center; gap: 6px; }
.msg-count-badge { font-size: 11px; background: var(--green-pale); color: var(--green-mid); border-radius: 10px; padding: 2px 8px; font-weight: 700; }
.msg-list { display: flex; flex-direction: column; gap: 8px; }
.msg-empty { text-align: center; color: var(--ink-faint); font-size: 14px; padding: 24px 0; }
.msg-card { background: var(--surface); border-radius: var(--radius-md); border: 1px solid var(--border); padding: 12px 14px; }

  border-color: #f5c4a0;

.age-week  { background: #e6f0fa; color: #2a6cb5; }
.age-month { background: #fff8e8; color: #e8a020; }

/* ── スピナー ── */

@keyframes spin { to { transform: rotate(360deg); } }

.menu-overlay.open { display: block; }
.side-menu { position: fixed; top: 0; left: -320px; bottom: 0; width: 300px; background: var(--surface); z-index: 201; transition: left 0.25s ease; display: flex; flex-direction: column; box-shadow: 4px 0 20px rgba(0,0,0,0.15); }

.menu-body { flex: 1; overflow-y: auto; padding: 6px 0; }

.menu-jichi-item { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; font-size: 16px; border-bottom: 1px solid var(--border); transition: background 0.1s; }

</style>

/* ── お気に入り（localStorage・最大3件）── */
var MAX_FAV = 3;
function getFavList(){
  try{ return JSON.parse(localStorage.getItem("fav_jids")||"[]"); }catch(e){ return []; }
}
function saveFavList(arr){ localStorage.setItem("fav_jids", JSON.stringify(arr)); }
function isFav(jid){ return getFavList().indexOf(jid)>=0; }
function addFav(jid){
  var list=getFavList();
  if(list.indexOf(jid)>=0) return;          // すでに登録済み
  if(list.length>=MAX_FAV) return;           // 3件上限
  list.push(jid); saveFavList(list);
}
function removeFav(jid){
  saveFavList(getFavList().filter(function(id){return id!==jid;}));
}
function toggleFavById(jid){
  if(isFav(jid)) removeFav(jid);
  else if(getFavList().length<MAX_FAV) addFav(jid);
  else return false; // 上限到達
  return true;
}

/* ── Firebase初期化 ── */
function initFirebase(){
  if(FIREBASE_CONFIG.apiKey==="YOUR_API_KEY"){ renderMain(); return; }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    firebaseOk=true;
  }catch(e){ console.error(e); }
  renderMain();
}

/* ── Firestoreリアルタイム購読 ── */
function subscribeMsgs(jid){
  if(!firebaseOk||msgListeners[jid]) return;
  var q=db.collection("messages")
          .where("jichiId","==",jid)
          .orderBy("timestamp","desc")
          .limit(10);
  msgListeners[jid]=q.onSnapshot(function(snap){
    msgCache[jid]=snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    // ボード表示中なら即時更新
    if(currentView==="board"&&boardJid===jid){
      var j=JICHIKAI.find(function(x){return x.id===jid;});
      var el=document.getElementById("msglist-"+jid);
      if(el&&j) el.innerHTML=renderMsgList(jid,j.name);
      var bc=document.getElementById("msgcount-"+jid);
      if(bc) bc.textContent=getMsgs(jid).length+"件";
    }
    // リスト表示中のカードバッジを即時更新
    refreshListBadge(jid);
    // お気に入りバナーのバッジを即時更新
    refreshFavBannerBadge(jid);
    // サイドメニューのバッジを即時更新
    refreshMenuBadge(jid);
  });
}
function unsubMsgs(jid){ if(msgListeners[jid]){ msgListeners[jid](); delete msgListeners[jid]; } }

function getMsgs(jid){
  if(firebaseOk) return msgCache[jid]||[];
  try{ return JSON.parse(localStorage.getItem("msgs_"+jid)||"[]"); }catch(e){ return []; }
}

/* ══════════════════════════════════════════
   ユーティリティ
══════════════════════════════════════════ */
function calcDist(a,b,c,d){
  var R=6371000,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180;
  var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
function fmtDist(m){ return m<1000?{n:m,u:"m"}:{n:(m/1000).toFixed(1),u:"km"}; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tsToDate(ts){ return ts&&ts.toDate?ts.toDate():new Date(ts); }
function fmtTs(ts){
  var d=tsToDate(ts);
  return d.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
}

/* 投稿時期判定 */
function tsAge(ts){
  var h=(Date.now()-tsToDate(ts).getTime())/3600000;
  if(h<24)  return "today";
  if(h<168) return "week";
  if(h<720) return "month";
  return "old";
}

/* バッジ：件数 + 最新投稿の色 */
function buildBadge(jid){
  var msgs=getMsgs(jid);
  var cnt=msgs.length;
  if(!cnt) return{cls:"badge-none",label:"0件"};
  var age=tsAge(msgs[0].timestamp);
  var cls=age==="today"?"badge-today":age==="week"?"badge-week":age==="month"?"badge-month":"badge-old";
  return{cls:cls,label:cnt+"件"};
}
/* メニューバッジ用クラス */
function menuBadgeCls(jid){
  var msgs=getMsgs(jid); if(!msgs.length) return"";
  var age=tsAge(msgs[0].timestamp);
  if(age==="today") return"menu-msg-badge"+" badge-today";
  if(age==="week")  return"menu-msg-badge"+" badge-week";
  if(age==="month") return"menu-msg-badge"+" badge-month";
  return"menu-msg-badge badge-old";
}

/* ══════════════════════════════════════════
   HTML生成
══════════════════════════════════════════ */
function renderMsgList(jid,name){
  var msgs=getMsgs(jid);
  if(!msgs.length) return'<div class="msg-empty">📭 まだお知らせはありません</div>';
  return msgs.map(function(m){
    var age=tsAge(m.timestamp);
    var ageCls=age==="today"?"age-today":age==="week"?"age-week":age==="month"?"age-month":"age-old";
    var ageLabel=age==="today"?"今日":age==="week"?"今週":age==="month"?"今月":"古い";
    var isHigh=(m.priority==="high");
    var cardCls="msg-card"+(isHigh?" priority-high":"");
    var priorityLabel=isHigh?'<span class="msg-priority-label">🔴 重要</span>':"";
    return'<div class="'+cardCls+'">'
      +'<div class="msg-meta">'
      +priorityLabel
      +'<span class="msg-jichi-name">'+esc(name)+'</span>'
      +'<span class="msg-time">'+fmtTs(m.timestamp)+'</span>'
      +'<span class="msg-age-badge '+ageCls+'">'+ageLabel+'</span>'
      +'</div>'
      +'<div class="msg-text">'+esc(m.text)+'</div>'
      +'</div>';
  }).join("");
}

/* リスト用カード */
function buildListCard(j,distM,showDist,isFav){
  var badge=buildBadge(j.id);
  var idx=JICHIKAI.indexOf(j)+1;
  var dist=distM!==null?fmtDist(distM):null;
  var distHtml=showDist&&dist
    ?'<div class="jichi-dist"><span class="dist-n">'+dist.n+'</span><span class="dist-u">'+dist.u+'</span></div>'
    :'<span class="jichi-idx">'+(isFav?'⭐':String(idx).padStart(2,"0"))+'</span>';
  return'<div class="jichi-item'+(isFav?" fav-item":"")+'\" id="li-'+j.id+'" onclick="openBoard(\''+j.id+'\')">'
    +'<div class="jichi-item-head">'
    +distHtml
    +'<div class="jichi-info">'
    +'<div class="jichi-name">'+esc(j.name)+'</div>'
    +'<div class="jichi-addr">'+esc(j.addr)+'</div>'
    +'</div>'
    +'<div class="jichi-badge '+badge.cls+'" id="badge-'+j.id+'">'+badge.label+'</div>'
    +'</div>'
    +'</div>';
}

/* ══════════════════════════════════════════
   ビュー描画
══════════════════════════════════════════ */
function renderMain(){
  if(currentView==="board"&&boardJid) renderBoardView();
  else renderListView();
}

/* ── リスト表示 ── */
function renderListView(){
  var favList=getFavList();
  var favJList=favList.map(function(id){ return JICHIKAI.find(function(x){return x.id===id;}); }).filter(Boolean);
  var html="";

  /* お気に入りバナー（最大3件） */
  if(favJList.length){
    favJList.forEach(function(favJ){
      var badge=buildBadge(favJ.id);
      html+='<div class="fav-banner" onclick="openBoard(\''+favJ.id+'\')">'
        +'<span class="fav-banner-icon">⭐</span>'
        +'<div class="fav-banner-info">'
        +'<div class="fav-banner-label">お気に入りの自治会</div>'
        +'<div class="fav-banner-name">'+esc(favJ.name)+'</div>'
        +'</div>'
        +'<span class="fav-banner-badge">'+badge.label+'</span>'
        +'<span class="fav-banner-arrow">›</span>'
        +'</div>';
      subscribeMsgs(favJ.id);
    });
  }

  /* 現在地バー */
  html+='<div class="location-bar">'
    +'<span class="loc-icon">📍</span>'
    +'<div class="loc-text">'+(userLat?'<strong>現在地を取得しました</strong>':"現在地を取得してください")+'</div>'
    +'<button class="loc-btn" onclick="getLocation()">'+(userLat?'再取得':'現在地を取得')+'</button>'
    +'</div>';

  /* 近隣3件のみ */
  if(userLat){
    html+='<div class="section-label">📡 現在地から近い自治会（上位3件）</div>';
    html+='<div class="jichi-list">';
    JICHIKAI.map(function(j){ return Object.assign({},j,{dist:calcDist(userLat,userLng,j.lat,j.lng)}); })
            .sort(function(a,b){return a.dist-b.dist;}).slice(0,3)
            .forEach(function(j){ html+=buildListCard(j,j.dist,true); subscribeMsgs(j.id); });
    html+='</div>';
  }else{
    html+='<div class="msg-empty" style="padding:30px 0;color:var(--ink-faint);font-size:13px;text-align:center">'
      +'📍 現在地を取得すると近くの自治会が表示されます<br>'
      +'<small style="color:var(--ink-faint)">自治会一覧は ☰ メニューからご覧いただけます</small>'
      +'</div>';
  }

  document.getElementById("main-content").innerHTML=html;
}

/* ── ボード表示（1自治会専用）── */
function renderBoardView(){
  var jid=boardJid;
  var j=JICHIKAI.find(function(x){return x.id===jid;});
  if(!j){ currentView="list"; renderListView(); return; }
  subscribeMsgs(jid);

  var favList=getFavList();
  var isFavNow=isFav(jid);
  var canAdd=favList.length<MAX_FAV;
  var msgs=getMsgs(jid);
  var cnt=msgs.length;

  /* 連絡先リンク */
  var links=[];
  if(j.tel)   links.push('<a class="detail-link-btn" href="tel:'+j.tel+'">📞 '+j.tel+'</a>');
  if(j.email) links.push('<a class="detail-link-btn" href="mailto:'+j.email+'">✉️ メール</a>');
  if(j.hp)    links.push('<a class="detail-link-btn" href="'+j.hp+'" target="_blank" rel="noopener">🌐 HP</a>');
  if(j.sns)   links.push('<a class="detail-link-btn" href="'+j.sns+'" target="_blank" rel="noopener">📱 SNS</a>');
  links.push('<a class="detail-link-btn" href="https://maps.google.com/maps?q='+j.lat+','+j.lng+'" target="_blank" rel="noopener">🗺️ 地図</a>');

  /* お気に入りボタン状態 */
  var favBtnCls="fav-toggle-btn"+(isFavNow?" is-fav":"")+((!isFavNow&&!canAdd)?" disabled":"");
  var favBtnLabel=isFavNow?"⭐ 登録中":(!canAdd?"★ 上限3件":"☆ お気に入り");

  var html=''
    +'<div class="board-view-header">'
    +'<button class="back-btn" onclick="backToList()">‹ 一覧に戻る</button>'
    +'<button class="'+favBtnCls+'\" id="fav-btn" onclick="toggleFav(\''+jid+'\')" title="お気に入りに登録（最大3件）">'+favBtnLabel+'</button>'
    +'</div>'
    +'<div class="board-view-name">'+esc(j.name)+'</div>'
    +'<div style="font-size:11px;color:var(--ink-faint);margin-bottom:14px">'+esc(j.addr)+'</div>'
    +'<div class="detail-links" style="margin-bottom:14px">'+links.join("")+'</div>'
    +'<div class="msg-board-header">'
    +'<div class="msg-board-title">📢 お知らせボード <span class="msg-count-badge" id="msgcount-'+jid+'">'+cnt+'件</span></div>'
    +'</div>'
    +'<div class="msg-list" id="msglist-'+jid+'">'+renderMsgList(jid,j.name)+'</div>';

  document.getElementById("main-content").innerHTML=html;
}

/* ── ボード遷移 ── */
function openBoard(jid){
  currentView="board"; boardJid=jid;
  subscribeMsgs(jid);
  renderBoardView();
  window.scrollTo({top:0,behavior:"smooth"});
}
function backToList(){
  currentView="list"; boardJid=null;
  renderListView();
  window.scrollTo({top:0,behavior:"smooth"});
}

/* ── お気に入りトグル ── */
function toggleFav(jid){
  var wasAdded=toggleFavById(jid);
  var now=isFav(jid);
  var canAdd=getFavList().length<MAX_FAV;
  var btn=document.getElementById("fav-btn");
  if(btn){
    var cls="fav-toggle-btn"+(now?" is-fav":"")+((!now&&!canAdd)?" disabled":"");
    btn.className=cls;
    btn.textContent=now?"⭐ 登録中":(!canAdd?"★ 上限3件":"☆ お気に入り");
  }
  if(!wasAdded&&!now){
    // 上限に達していて追加できなかった場合
    alert("お気に入りは最大3件まで登録できます。\n登録済みの自治会のボードから解除してください。");
  }
}

/* ── バッジ即時更新（リスト表示中）── */
function refreshListBadge(jid){
  var el=document.getElementById("badge-"+jid); if(!el) return;
  var badge=buildBadge(jid);
  el.className="jichi-badge "+badge.cls; el.textContent=badge.label;
}

/* ── サイドメニュー ── */
function buildMenu(){
  var favList=getFavList();
  var html="";
  if(favList.length){
    html+='<div class="menu-section-title">⭐ お気に入り</div>';
    favList.forEach(function(fid){
      var fj=JICHIKAI.find(function(x){return x.id===fid;}); if(!fj) return;
      var c=getMsgs(fj.id).length;
      var bc=menuBadgeCls(fj.id);
      html+='<div class="menu-jichi-item active" onclick="selectFromMenu(\''+fj.id+'\')">'
        +'<span class="menu-jichi-icon">⭐</span>'
        +'<span class="menu-jichi-name-text">'+esc(fj.name)+'</span>'
        +(c?'<span class="'+bc+'">'+c+'件</span>':"")
        +'</div>';
    });
    html+='<div class="menu-section-title">自治会一覧</div>';
  }
  JICHIKAI.forEach(function(j,i){
    var c=getMsgs(j.id).length;
    var bc=menuBadgeCls(j.id);
    html+='<div class="menu-jichi-item" id="mi-'+j.id+'" onclick="selectFromMenu(\''+j.id+'\')">'
      +'<span class="menu-jichi-icon">🏘️</span>'
      +'<span class="menu-jichi-num">'+String(i+1).padStart(2,"0")+'</span>'
      +'<span class="menu-jichi-name-text">'+esc(j.name)+'</span>'
      +(c?'<span class="'+bc+'" id="mb-'+j.id+'">'+c+'件</span>':'<span id="mb-'+j.id+'"></span>')
      +'</div>';
  });
  document.getElementById("menu-body").innerHTML=html;
}
function refreshMenuBadge(jid){
  var el=document.getElementById("mb-"+jid); if(!el) return;
  var c=getMsgs(jid).length;
  var bc=menuBadgeCls(jid);
  el.className=bc; el.textContent=c?c+"件":"";
}
function openMenu(){ buildMenu(); document.getElementById("side-menu").classList.add("open"); document.getElementById("menu-overlay").classList.add("open"); document.body.style.overflow="hidden"; }
function closeMenu(){ document.getElementById("side-menu").classList.remove("open"); document.getElementById("menu-overlay").classList.remove("open"); document.body.style.overflow=""; }
function selectFromMenu(jid){ closeMenu(); openBoard(jid); }

/* ── GPS ── */
function getLocation(){
  if(!navigator.geolocation){ alert("このブラウザではGPSが使えません"); return; }
  navigator.geolocation.getCurrentPosition(
    function(p){ userLat=p.coords.latitude; userLng=p.coords.longitude; if(currentView==="list") renderListView(); },
    function(){ if(currentView==="list") renderListView(); },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* ── 起動時の初期表示 ── */
function startup(){
  // 全自治会を購読してリアルタイムバッジ更新
  JICHIKAI.forEach(function(j){ subscribeMsgs(j.id); });
  var favList=getFavList();
  if(favList.length===1&&JICHIKAI.find(function(x){return x.id===favList[0];})){
    /* お気に入りが1件だけならすぐそのボードを表示 */
    currentView="board"; boardJid=favList[0];
  }
  renderMain();
  getLocation();
}

/* ── 初期化 ── */
initFirebase();
// initFirebase内でrenderMain→startupに差し替え
function initFirebase(){
  if(FIREBASE_CONFIG.apiKey==="YOUR_API_KEY"){ startup(); return; }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore(); firebaseOk=true;
  }catch(e){ console.error(e); }
  startup();
}
initFirebase();
</script>
