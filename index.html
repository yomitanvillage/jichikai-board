.dist-u { font-size: 9px; color: var(--ink-light); display: block; }

/* ── アプリ状態 ── */
var userLat=null, userLng=null, activeJid=null, currentTab="near";
var openDetails={}, msgCache={}, msgListeners={};
var db=null, firebaseOk=false;

/* ── Firebase初期化 ── */
function initFirebase(){
  if(FIREBASE_CONFIG.apiKey==="YOUR_API_KEY"){
    console.warn("Firebase未設定 — localStorageモードで動作");
    firebaseOk=false; renderMain(); return;
  }
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.firestore();
    firebaseOk=true;
    console.log("Firebase接続OK");
  }catch(e){
    console.error("Firebase初期化エラー:",e);
    firebaseOk=false;
  }
  renderMain();
}

/* ── メッセージ購読 ── */
function subscribeMsgs(jid){
  if(!firebaseOk||msgListeners[jid]) return;
  var q=db.collection("messages")
          .where("jichiId","==",jid)
          .orderBy("timestamp","desc")
          .limit(10);
  msgListeners[jid]=q.onSnapshot(function(snap){
    msgCache[jid]=snap.docs.map(function(d){ return Object.assign({id:d.id},d.data()); });
    if(openDetails[jid]){
      var el=document.getElementById("msglist-"+jid);
      var j=JICHIKAI.find(function(x){return x.id===jid;});
      if(el&&j) el.innerHTML=renderMsgList(jid,j.name);
      var badge=document.getElementById("msgcount-"+jid);
      if(badge) badge.textContent=getMsgs(jid).length+"件";
    }
    refreshMenuBadge(jid);
  });
}
function unsubMsgs(jid){
  if(msgListeners[jid]){ msgListeners[jid](); delete msgListeners[jid]; }
}

function getMsgs(jid){
  if(firebaseOk) return msgCache[jid]||[];
  try{ return JSON.parse(localStorage.getItem("msgs_"+jid)||"[]"); }catch(e){ return []; }
}

/* ── ユーティリティ ── */
function calcDist(a,b,c,d){
  var R=6371000,dLat=(c-a)*Math.PI/180,dLng=(d-b)*Math.PI/180;
  var x=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}
function fmtDist(m){ return m<1000?{n:m,u:"m"}:{n:(m/1000).toFixed(1),u:"km"}; }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function tsToDate(ts){
  if(!ts) return new Date();
  if(ts.toDate) return ts.toDate();
  return new Date(ts);
}
function fmtTs(ts){
  var d=tsToDate(ts);
  return d.toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"});
}
function ageBadge(ts){
  var h=(Date.now()-tsToDate(ts).getTime())/3600000;
  if(h<24)  return{cls:"age-today", label:"今日"};
  if(h<168) return{cls:"age-week",  label:"今週"};
  if(h<720) return{cls:"age-month", label:"今月"};
  return         {cls:"age-old",   label:"古い"};
}
function jichiiBadge(jid){
  var m=getMsgs(jid);
  if(!m.length) return{cls:"badge-none",label:"投稿なし"};
  var a=ageBadge(m[0].timestamp);
  if(a.cls==="age-today") return{cls:"badge-new",   label:"新着"};
  if(a.cls==="age-week")  return{cls:"badge-recent",label:"今週"};
  if(a.cls==="age-month") return{cls:"badge-recent",label:"今月"};
  return {cls:"badge-old",label:"古い"};
}

/* ── HTML生成 ── */
function renderMsgList(jid,name){
  var msgs=getMsgs(jid);
  if(!msgs.length) return'<div class="msg-empty">📭 まだお知らせはありません</div>';
  return msgs.map(function(m){
    var age=ageBadge(m.timestamp);
    return'<div class="msg-card">'
      +'<div class="msg-meta">'
      +'<span class="msg-jichi-name">'+esc(name)+'</span>'
      +'<span class="msg-time">'+fmtTs(m.timestamp)+'</span>'
      +'<span class="msg-age-badge '+age.cls+'">'+age.label+'</span>'
      +'</div>'
      +'<div class="msg-text">'+esc(m.text)+'</div>'
      +'</div>';
  }).join("");
}

function buildCard(j,distM,showDist){
  var badge=jichiiBadge(j.id), msgs=getMsgs(j.id), isOpen=!!openDetails[j.id];
  var idx=JICHIKAI.indexOf(j)+1;
  var dist=distM!==null?fmtDist(distM):null;
  var links=[];
  if(j.tel)   links.push('<a class="detail-link-btn" href="tel:'+j.tel+'">📞 電話</a>');
  if(j.email) links.push('<a class="detail-link-btn" href="mailto:'+j.email+'">✉️ メール</a>');
  if(j.hp)    links.push('<a class="detail-link-btn" href="'+j.hp+'" target="_blank" rel="noopener">🌐 HP</a>');
  if(j.sns)   links.push('<a class="detail-link-btn" href="'+j.sns+'" target="_blank" rel="noopener">📱 SNS</a>');
  links.push('<a class="detail-link-btn" href="https://maps.google.com/maps?q='+j.lat+','+j.lng+'" target="_blank" rel="noopener">🗺️ 地図</a>');

  var distHtml=showDist&&dist
    ?'<div class="jichi-dist"><span class="dist-n">'+dist.n+'</span><span class="dist-u">'+dist.u+'</span></div>'
    :'<span class="jichi-idx">'+String(idx).padStart(2,"0")+'</span>';

  return'<div class="jichi-item'+(isOpen?" active":"")+'\" id="card-'+j.id+'">'
    +'<div class="jichi-item-head" onclick="toggleDetail(\''+j.id+'\')">'
    +distHtml
    +'<div class="jichi-info">'
    +'<div class="jichi-name">'+esc(j.name)+'</div>'
    +'<div class="jichi-addr">'+esc(j.addr)+'</div>'
    +'</div>'
    +'<div class="jichi-badge '+badge.cls+'">'+badge.label+'</div>'
    +'</div>'
    +'<div class="jichi-detail'+(isOpen?" open":"")+'\" id="detail-'+j.id+'">'
    +'<div class="detail-info-grid">'
    +'<div class="detail-info-item"><div class="detail-info-label">住所</div><div class="detail-info-value">'+esc(j.addr)+'</div></div>'
    +'<div class="detail-info-item"><div class="detail-info-label">電話</div><div class="detail-info-value">'+(j.tel||"—")+'</div></div>'
    +(j.email?'<div class="detail-info-item"><div class="detail-info-label">メール</div><div class="detail-info-value"><a href="mailto:'+j.email+'">'+j.email+'</a></div></div>':"")
    +'</div>'
    +(links.length?'<div class="detail-links">'+links.join("")+'</div>':"")
    +'<div class="msg-board-header"><div class="msg-board-title">📢 お知らせボード <span class="msg-count-badge" id="msgcount-'+j.id+'">'+msgs.length+'件</span></div></div>'
    +'<div class="msg-list" id="msglist-'+j.id+'">'+renderMsgList(j.id,j.name)+'</div>'
    +'</div>'
    +'</div>';
}

/* ── タブ・描画 ── */
function showTab(tab){
  currentTab=tab;
  document.querySelectorAll(".bottom-tab").forEach(function(b,i){
    b.classList.toggle("active",["near","all","all-msg"][i]===tab);
  });
  renderMain();
}

function renderMain(){
  var el=document.getElementById("main-content");
  var html="";

  if(currentTab==="near"){
    html+='<div class="location-bar">'
      +'<span class="loc-icon">📍</span>'
      +'<div class="loc-text">'+(userLat?'<strong>現在地を取得しました</strong>'+userLat.toFixed(5)+', '+userLng.toFixed(5):"現在地を取得してください")+'</div>'
      +'<button class="loc-btn" onclick="getLocation()">現在地を取得</button>'
      +'</div>';
    html+='<div class="section-label">📡 現在地から近い自治会（上位3件）</div>';
    if(!userLat){
      html+='<div class="msg-empty" style="padding:30px 0">📍 上のボタンを押して現在地を取得してください</div>';
    }else{
      var sorted=JICHIKAI.map(function(j){ return Object.assign({},j,{dist:calcDist(userLat,userLng,j.lat,j.lng)}); })
                         .sort(function(a,b){return a.dist-b.dist;}).slice(0,3);
      html+='<div class="jichi-list">';
      sorted.forEach(function(j){ html+=buildCard(j,j.dist,true); });
      html+='</div>';
    }
  } else if(currentTab==="all"){
    html+='<div class="section-label">📋 読谷村 自治会一覧（全'+JICHIKAI.length+'件）</div><div class="jichi-list">';
    JICHIKAI.forEach(function(j){ html+=buildCard(j,null,false); });
    html+='</div>';
  } else {
    html+='<div class="section-label">📢 全自治会のお知らせ（新着順）</div>';
    var all=[];
    JICHIKAI.forEach(function(j){ getMsgs(j.id).forEach(function(m){ all.push(Object.assign({},m,{jname:j.name})); }); });
    all.sort(function(a,b){ return tsToDate(b.timestamp)-tsToDate(a.timestamp); });
    if(!all.length){
      html+='<div class="msg-empty" style="padding:40px 0">📭 まだお知らせはありません</div>';
    }else{
      html+='<div class="msg-list">';
      all.forEach(function(m){
        var age=ageBadge(m.timestamp);
        html+='<div class="msg-card">'
          +'<div class="msg-meta">'
          +'<span class="msg-jichi-name">'+esc(m.jname)+'</span>'
          +'<span class="msg-time">'+fmtTs(m.timestamp)+'</span>'
          +'<span class="msg-age-badge '+age.cls+'">'+age.label+'</span>'
          +'</div>'
          +'<div class="msg-text">'+esc(m.text)+'</div>'
          +'</div>';
      });
      html+='</div>';
    }
  }
  el.innerHTML=html;
}

/* ── 詳細トグル ── */
function toggleDetail(jid){
  if(openDetails[jid]){
    delete openDetails[jid]; unsubMsgs(jid); activeJid=null;
  }else{
    Object.keys(openDetails).forEach(function(id){ unsubMsgs(id); });
    openDetails={}; openDetails[jid]=true; activeJid=jid; subscribeMsgs(jid);
  }
  renderMain();
}

/* ── サイドメニュー ── */
function buildMenu(){
  document.getElementById("menu-body").innerHTML=JICHIKAI.map(function(j,i){
    var c=getMsgs(j.id).length;
    return'<div class="menu-jichi-item'+(activeJid===j.id?" active":"")+'\" id="mi-'+j.id+'" onclick="selectFromMenu(\''+j.id+'\')">'
      +'<span class="menu-jichi-num">'+String(i+1).padStart(2,"0")+'</span>'
      +'<span class="menu-jichi-name-text">'+esc(j.name)+'</span>'
      +(c?'<span class="menu-msg-badge" id="mb-'+j.id+'">'+c+'</span>':'<span id="mb-'+j.id+'"></span>')
      +'</div>';
  }).join("");
}
function refreshMenuBadge(jid){
  var el=document.getElementById("mb-"+jid); if(!el) return;
  var c=getMsgs(jid).length;
  el.className=c?"menu-msg-badge":""; el.textContent=c?c:"";
}
function openMenu(){ buildMenu(); document.getElementById("side-menu").classList.add("open"); document.getElementById("menu-overlay").classList.add("open"); document.body.style.overflow="hidden"; }
function closeMenu(){ document.getElementById("side-menu").classList.remove("open"); document.getElementById("menu-overlay").classList.remove("open"); document.body.style.overflow=""; }
function selectFromMenu(jid){
  closeMenu(); currentTab="all";
  document.querySelectorAll(".bottom-tab").forEach(function(b,i){ b.classList.toggle("active",i===1); });
  Object.keys(openDetails).forEach(function(id){ unsubMsgs(id); }); openDetails={};
  openDetails[jid]=true; activeJid=jid; subscribeMsgs(jid);
  renderMain();
  setTimeout(function(){ var el=document.getElementById("card-"+jid); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); },120);
}

/* ── GPS ── */
function getLocation(){
  if(!navigator.geolocation){ alert("このブラウザではGPSが使えません"); return; }
  navigator.geolocation.getCurrentPosition(
    function(p){ userLat=p.coords.latitude; userLng=p.coords.longitude; renderMain(); },
    function(){ userLat=26.3957; userLng=127.7472; renderMain(); },
    {enableHighAccuracy:true,timeout:8000}
  );
}

/* ── 時計 ── */
function updateClock(){
  var n=new Date(), days=["日","月","火","水","木","金","土"];
  var c=document.getElementById("clock"), d=document.getElementById("clock-date");
  if(c) c.textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  if(d) d.textContent=(n.getMonth()+1)+"月"+n.getDate()+"日（"+days[n.getDay()]+"）";
}

/* ── 初期化 ── */
updateClock(); setInterval(updateClock,30000);
initFirebase();
getLocation();
</script>
</body>
</html>
